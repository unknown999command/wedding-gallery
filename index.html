<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кирилл &amp; Александра — Свадебная галерея</title>
  <meta name="description" content="Фотографии и видео с нашей свадьбы">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Controls -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
  <!-- Minimal Header -->
  <header class="header">
    <div class="header-container">
      <span class="wedding-names">Кирилл &amp; Александра</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Сменить тему">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <!-- Simple Title -->
      <div class="gallery-intro">
        <h1>Свадебный альбом</h1>
        <p class="wedding-date">16 июня 2026</p>
      </div>

      <!-- Unified Grid (Photos & Videos) -->
      <div class="media-grid" id="mediaGrid"></div>
    </div>
  </main>

  <!-- Universal Lightbox (Supports Photos & Videos) -->
  <div class="lightbox" id="lightboxModal" aria-hidden="true" role="dialog">
    <button class="lightbox-close" id="lightboxClose" aria-label="Закрыть"><i class="fas fa-times"></i></button>
    <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Назад"><i class="fas fa-chevron-left"></i></button>
    
    <div class="lightbox-content">
      <!-- Media container (JS will inject either <img> or <video>) -->
      <div id="lightboxMediaContainer"></div>
      <div class="lightbox-caption" id="lightboxCaption">Описание</div>
    </div>
    
    <button class="lightbox-nav next" id="lightboxNext" aria-label="Вперед"><i class="fas fa-chevron-right"></i></button>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; Кирилл &amp; Александра, 2026</p>
  </footer>

  <script src="media-list.js"></script>
  <script src="script.js"></script>
</body>
</html>
